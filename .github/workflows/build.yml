# Builds "GW Order Tool.exe" automatically in the cloud on a Windows machine —
# no local Windows PC or Python setup needed.
#
# When it runs:
#   - every push to main that touches the app code / build files
#   - or manually: GitHub -> Actions -> "Build Windows exe" -> Run workflow
#
# Where to get the exe afterwards (either works):
#   1. Releases page (easiest): https://github.com/awenfranklinuts/gw-ordering-script/releases/latest
#      — always holds the newest build as "GW.Order.Tool.exe".
#   2. Actions tab -> click the finished run -> download the "GW-Order-Tool" artifact (a zip).
name: Build Windows exe

on:
  push:
    branches: [main]
    paths:
      - "gw_order_tool.py"
      - "neto_scraper.py"
      - "GW Order Tool.spec"
      - "requirements.txt"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: write # needed to update the "latest" release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Bundles a chromedriver matching current Chrome stable straight into the exe
      # (see GW Order Tool.spec), so the app doesn't need network access or Chrome
      # auto-detection at runtime to obtain a driver — that runtime dependency (via
      # Selenium Manager) is what caused "Unable to obtain driver for chrome" on
      # other people's machines. Non-fatal on failure: if this step can't reach the
      # Chrome for Testing endpoint, the build just proceeds without a bundled
      # driver and neto_scraper falls back to Selenium Manager, same as before.
      - name: Download matching chromedriver (Chrome for Testing)
        shell: pwsh
        run: |
          try {
            $json = Invoke-RestMethod -Uri "https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json"
            $stable = $json.channels.Stable
            $driverUrl = ($stable.downloads.chromedriver | Where-Object { $_.platform -eq "win64" }).url
            Write-Host "Chrome Stable $($stable.version) -> $driverUrl"
            Invoke-WebRequest -Uri $driverUrl -OutFile chromedriver.zip
            Expand-Archive -Path chromedriver.zip -DestinationPath chromedriver_extract -Force
            Copy-Item -Path "chromedriver_extract\chromedriver-win64\chromedriver.exe" -Destination "chromedriver.exe" -Force
            Write-Host "Bundled chromedriver.exe ready."
          } catch {
            Write-Warning "Could not download chromedriver ($_); build will fall back to Selenium Manager at runtime."
          }

      - name: Build with PyInstaller
        run: pyinstaller "GW Order Tool.spec" --noconfirm

      - name: Verify the exe was produced
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/GW Order Tool.exe")) {
            Write-Error "Build finished but dist/GW Order Tool.exe is missing."
            exit 1
          }
          Get-Item "dist/GW Order Tool.exe" | Format-List Name, Length

      - name: Upload exe as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GW-Order-Tool
          path: dist/GW Order Tool.exe
          if-no-files-found: error

      - name: Publish/refresh the "latest" release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: GW Order Tool (latest build)
          body: |
            Newest automatic build of GW Order Tool.exe (from commit ${{ github.sha }}).

            Download the exe below, copy it to any Windows PC with Google Chrome
            installed, and keep it in a normal writable folder (not Program Files) —
            it saves its data files next to itself. No Python or setup needed.
          files: dist/GW Order Tool.exe
          fail_on_unmatched_files: true
